{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="glass-panel">
            <div class="row">
                <div class="col-md-6">
                    {% if product.image %}
                        <img src="{{ product.image.url }}" class="img-fluid rounded" alt="{{ product.name }}">
                    {% else %}
                        <div class="text-center py-5" style="background: rgba(255,255,255,0.05); border-radius: 8px;">
                            <span style="font-size: 6rem;">🚀</span>
                        </div>
                    {% endif %}
                </div>
                <div class="col-md-6">
                    <h2>{{ product.name }}</h2>
                    <p class="text-muted">{{ product.description }}</p>
                    
                    <div class="my-4">
                        <span class="h3 text-info">{{ product.price }} ₽</span>
                        <div class="small text-muted mt-2">
                            В наличии: {{ product.stock }} шт.
                        </div>
                    </div>
                    
                    <form method="post" action="{% url 'shopping_cart:add_to_cart' product.id %}">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <a href="{% url 'shop:product_list' %}" class="btn btn-outline-light">← Назад</a>
                            <button type="submit" class="btn btn-cosmic flex-grow-1">🛒 Добавить в корзину</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
