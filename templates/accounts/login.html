{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="glass-panel">
            <h2 class="text-center mb-4">🔐 Вход для своих</h2>
            
            <form method="post" novalidate>
                {% csrf_token %}
                
                {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-cosmic btn-lg">Войти на борт</button>
                </div>
            </form>
            
            <div class="text-center mt-3">
                <!-- ИСПРАВЛЕННАЯ ССЫЛКА НА СБРОС ПАРОЛЯ -->
                <small>
                    <a href="{% url 'accounts:password_reset' %}" class="text-muted">Забыли пароль?</a> | 
                    <a href="{% url 'accounts:register' %}" class="text-info">Подать заявку</a>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
