{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="glass-panel">
            <h2 class="mb-4">🔑 Восстановление доступа</h2>
            <p class="text-muted">Введите email, указанный при регистрации. Мы отправим ссылку для сброса пароля.</p>
            
            <form method="post" novalidate>
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_email" class="form-label">Email адрес</label>
                    <input type="email" name="email" class="form-control" id="id_email" required>
                </div>
                <button type="submit" class="btn btn-cosmic w-100">Отправить ссылку</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
