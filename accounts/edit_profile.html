{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="glass-panel">
            <h2 class="mb-4">✏️ Редактирование досье</h2>
            
            <form method="post" novalidate>
                {% csrf_token %}
                
                {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-cosmic">Сохранить изменения</button>
                    <a href="{% url 'accounts:profile' %}" class="btn btn-outline-light">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
